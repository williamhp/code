<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Junta Aí · Disponibilidade</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #032363 30%, #e6edf9 150%);
      color: #1e293b;
      min-height: 100vh;
      padding: 20px 16px 80px;
    }
    .app-container { max-width: 500px; margin: 0 auto; }
    .header-bar {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    }
    .back-btn {
      background: rgba(255,255,255,0.9); width: 44px; height: 44px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: #032363; font-size: 1.3rem; text-decoration: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    h1 {
      font-size: 1.8rem; font-weight: 700;
      background: linear-gradient(135deg, #032363, #8b5cf6);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .card {
      background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px;
      border: 2px solid #032363; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }
    .filter-group {
      margin-bottom: 24px;
    }
    .filter-title {
      font-weight: 600; margin-bottom: 12px;
    }
    .chip-container {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .chip {
      background: #f1f5f9; padding: 10px 18px; border-radius: 40px;
      font-size: 0.9rem; cursor: pointer; border: 1px solid transparent;
    }
    .chip.active { background: #032363; color: white; }
    .result-item {
      display: flex; align-items: center; gap: 14px; padding: 14px 0;
      border-bottom: 1px solid #eef2f6;
    }
    .btn-primary {
      background: #032363; color: white; border: none;
      padding: 14px 20px; border-radius: 40px; font-weight: 700;
      cursor: pointer; width: 100%;
    }
    .toast-msg {
      visibility: hidden; min-width: 200px; background: #1f3a7c;
      color: white; text-align: center; border-radius: 40px;
      padding: 12px 20px; position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%); font-size: 0.9rem; opacity: 0;
      transition: 0.2s; z-index: 1000;
    }
    .toast-msg.show { visibility: visible; opacity: 1; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header-bar">
    <a href="Juntaitest.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h1><i class="far fa-clock"></i> Disponibilidade</h1>
  </div>

  <div class="card">
    <div class="filter-group">
      <div class="filter-title">Período</div>
      <div class="chip-container" id="periodoContainer">
        <span class="chip active" data-periodo="manha">🌅 Manhã</span>
        <span class="chip" data-periodo="tarde">🌇 Tarde</span>
        <span class="chip" data-periodo="noite">🌙 Noite</span>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-title">Dias da semana</div>
      <div class="chip-container" id="diasContainer">
        <span class="chip active" data-dia="seg">Seg</span>
        <span class="chip" data-dia="ter">Ter</span>
        <span class="chip" data-dia="qua">Qua</span>
        <span class="chip" data-dia="qui">Qui</span>
        <span class="chip" data-dia="sex">Sex</span>
        <span class="chip" data-dia="sab">Sáb</span>
        <span class="chip" data-dia="dom">Dom</span>
      </div>
    </div>
    <button class="btn-primary" id="applyFilterBtn">Aplicar filtros</button>
  </div>

  <div class="card" id="resultsContainer">
    <p>Selecione os filtros e clique em "Aplicar".</p>
  </div>
</div>

<div id="toastMsg" class="toast-msg">🔍 Filtros aplicados</div>

<script>
  const pessoas = [
    { nome: 'Marina Lima', disponibilidade: ['manha', 'tarde'], dias: ['seg','qua','sex'] },
    { nome: 'Rafael Souza', disponibilidade: ['noite'], dias: ['ter','qui'] },
    { nome: 'Ana Clara', disponibilidade: ['tarde'], dias: ['seg','qua'] },
    { nome: 'João Pedro', disponibilidade: ['manha'], dias: ['seg','ter','qua','qui','sex'] },
  ];

  const container = document.getElementById('resultsContainer');
  const toast = document.getElementById('toastMsg');
  let periodoSelecionado = 'manha';
  let diasSelecionados = ['seg'];

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }

  function renderResults() {
    const filtrados = pessoas.filter(p => 
      p.disponibilidade.includes(periodoSelecionado) &&
      p.dias.some(d => diasSelecionados.includes(d))
    );
    let html = `<p><strong>${filtrados.length} pessoas disponíveis</strong></p>`;
    filtrados.forEach(p => {
      html += `
        <div class="result-item">
          <div class="avatar" style="width:48px; height:48px; background:#a78bfa; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">${p.nome.charAt(0)}</div>
          <div style="flex:1;"><strong>${p.nome}</strong><br>${p.disponibilidade.join('/')} · ${p.dias.join('/')}</div>
          <button class="connect-btn" style="background:#032363; color:white; border:none; padding:6px 12px; border-radius:30px;">Convidar</button>
        </div>
      `;
    });
    container.innerHTML = html || '<p>Nenhuma pessoa encontrada.</p>';
    document.querySelectorAll('.connect-btn').forEach(btn => {
      btn.addEventListener('click', () => showToast('📅 Convite enviado!'));
    });
  }

  // Configurar chips
  document.querySelectorAll('#periodoContainer .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#periodoContainer .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      periodoSelecionado = chip.dataset.periodo;
    });
  });

  document.querySelectorAll('#diasContainer .chip').forEach(chip => {
    chip.addEventListener('click', (e) => {
      e.stopPropagation();
      chip.classList.toggle('active');
      const dia = chip.dataset.dia;
      if (chip.classList.contains('active')) {
        if (!diasSelecionados.includes(dia)) diasSelecionados.push(dia);
      } else {
        diasSelecionados = diasSelecionados.filter(d => d !== dia);
      }
    });
  });

  document.getElementById('applyFilterBtn').addEventListener('click', () => {
    if (diasSelecionados.length === 0) {
      alert('Selecione pelo menos um dia.');
      return;
    }
    renderResults();
    showToast('🔍 Filtros aplicados!');
  });

  // Inicial
  renderResults();
</script>
</body>
</html>
