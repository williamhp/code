<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Juntai Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      margin-top: 44px;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(145deg , #032363 30%, #e6edf9 150%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 10px;
      background-image: url('logo.png');
      background-size: 200px 200px;
    }
    .card {
      background: #fff;
      border-radius: 36px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 4px; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
    label { display: block; text-align: left; font-size: 0.85rem; color: #444; margin-bottom: 16px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 4px solid  #032363;
      border-radius: 36px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 0.90rem;
    }
    input:focus { border-color: #4f46e5; }
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      margin-top: 20px;
      background: #032363;
      color: #fff;
      border: none;
      border-radius: 36px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #3730a3; }
    .iv{
        font-family:sans-serif;
        font-size: 1rem;
        
    }
    .esq{
        display:block;
        margin-top: 12px;
        text-align: right;
        border-radius: 46px 46px;
        
        
        
    }
    .crc{
        margin-top: 0.90rem;
        text-align: right;
        cursor: pointer;
        margin-left: 190px
    }
    button{
      border-radius: 36px 36px;
      padding: 5px;
      border-radius:5px;
    }
    .log{
      width: 100px;
      height: 100px;
      margin-bottom: 20px;
      display: flex;
      margin-left: 110px;
      align-items: center;
      border-radius: 80px;
    }
    .header1{
      padding: 0;
      margin-bottom: 50px;
      margin-bottom: 10px;
    }
     </style>

</head>
<body>
  <div class="header1"></div>
  <div class="card">
         
    <div class="logo"></div>
                  <img class="log"  src="logo.png" alt="" >
    <div >
        <p class="iv"><h2>Entrar com a sua Conta</h2></p>
    </div>
     <label for="nome"><strong>Nome</strong></label>
     <input type="text" id="nome" placeholder="Ex: Nome Completo" maxlength="20" />
     <label for="ra"><strong>Número de RA</strong></label>
     <input type="text" id="ra" placeholder="Ex: Numero do RA" maxlength="20" />
     <label for="ra"><strong>Senha</strong></label>
     <input type="text" id="Senha" placeholder="Digite Sua Senha" maxlength="20" />
        <div class="esq">
        <a href="emailtest.html" >Esqueceu a Senha?
     </div>
     <div>
    <a href="Juntaitest.html" class="btn">Continuar</a>
        </div>
      <div class="crc">
        <a href="criarconta.html">Criar uma Conta </a>
        
      </div> 
     
  </div>
</body>
</html>
