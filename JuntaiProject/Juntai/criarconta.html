<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Juntai Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      margin: 20%;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(145deg , #032363 30%, #e6edf9 150%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 36px 36px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 4px; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
    label { display: block; text-align: left; font-size: 0.85rem; color: #444; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 4px solid #032363;
      border-radius: 36px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 15px;
    }
    input:focus { border-color: #4f46e5; }
    .btn {
      display: block;
      
      padding: 13px;
      margin-left: 19px;
      margin-top: 20px;
      background: #032363;
      color: #fff;
      border: none;
      border-radius: 36px 36px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #3730a3; }
    .iv{
        font-family:sans-serif;
        font-size: 1rem;
        
    }
    .lg{
      text-align: right;
      border-radius: 36px;
      margin-left: 13rem;
      padding: 5px;
      border-radius: 16px 16px;
    }
    .header{
        margin-bottom: 50px;
    }
    .lg1{
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 5px;
      width: 1px;
    }
     </style>
</head>
<body>
   <div class="header1"></div>
  <div class="card">
                      
    <div class="logo"></div>
               <div class="header"><h1>Junta aí</h1></div>
    <div > 
                                    <img class="lg1" src="logo.png" alt="">      
        <p class="iv"><h2>Crie uma Conta</h2></p>
    </div>
     <label for="nome"><strong>Nome</strong></label>
     <input type="text" id="nome" placeholder="Ex: Ana Maria julia da Silva" maxlength="20" />
     <label for="ra"><strong>Número do RA</strong></label>
     <input type="text" id="ra" placeholder="Ex: 2024001234" maxlength="20" />
     <label for="Senha"><strong>Senha</strong></label>
     <input type="text" id="Senha" placeholder="Ex: #$a2400201234" maxlength="20" />
      <label for="ra"><strong>Email</strong></label>
     <input type="text" id="Email" placeholder="aluno@faculdade.edu.br" maxlength="20" /> 
      <label for="ra"><strong>Faculdade</strong></label>
      <input type="text" id="Faculdade" placeholder="Ex:faculdade usjt" maxlength="20" />
      <div class="lg">
        <a href="logintest.html" class="btn" onclick="alert('Cadastro concluído! Bem-vindo ao A Comunidade Junta Aí 🎉')">Confirmar</a></button>
      </div>
      
   
  </div>
</body>
</html>
