<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email - Junta Aí</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #032363;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    .logo { font-size: 2rem; margin-bottom: 8px; }
    h1 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 4px; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
    .step { font-size: 0.8rem; color: #4f46e5; margin-bottom: 16px; }
    label { display: block; text-align: left; font-size: 0.85rem; color: black; margin-bottom: 10px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 4px solid #032363;
      border-radius: 36px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      margin-top: 20px;
      background: #032363;
      color: #fff;
      border: none;
      border-radius: 36px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: skyblue; }
    .back { display: block; margin-top: 12px; font-size: 0.85rem; color: #888; text-decoration: none; }
    .back:hover { color: #4f46e5; }
    .sd{
            margin: 8.50px;
            margin-left: 30px;
    }
    button{
      border-radius: 36px 36px ;
      padding: 5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📧</div>
    <h1>Recupere Sua Conta pelo Seu e-mail</h1>
    <p class="step"></p>
    <p>Use seu e-mail institucional ou pessoal</p>
   
    <label for="email"><strong>E-mail</label>
    <input type="email" id="email" placeholder="aluno@faculdade.edu.br" />
     <div class="sd">
    
    <a href="logintest.html" onclick="alert('Obrigado por Enviar Seu Email! Enviamos um Email para sua Conta,Você pode Redefinir uma nova Senha! 🎉')" class="btn">Voltar</a>
    </div>
  </div>
</body>
</html>
