<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Junta Aí · Chat do Grupo</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #032363 10%, #e6edf9 100%);
      font-family: 'Inter', sans-serif;
      color: #0f172a;
      padding: 24px 16px 48px 16px;
      min-height: 100vh;
    }

    /* Main container */
    .chat-app {
      max-width: 680px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 85vh;
      min-height: 600px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e2b6e, #2b4c9e);
      padding: 20px 24px;
      color: white;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-link {
      background: rgba(255,255,255,0.15);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
      font-size: 1.2rem;
      transition: 0.2s;
    }

    .back-link:hover {
      background: rgba(255,255,255,0.3);
    }

    .group-info {
      flex: 1;
    }

    .group-name {
      font-size: 1.4rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .online-badge {
      background: #4ade80;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 30px;
      color: #022c22;
      font-weight: 600;
    }

    .members {
      font-size: 0.8rem;
      opacity: 0.9;
      margin-top: 4px;
    }

    /* Área de mensagens */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 10px 20px;
      background: #f9fbfe;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-row {
      display: flex;
      gap: 12px;
      max-width: 85%;
    }

    .message-row.own {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar-msg {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #1e293b;
      flex-shrink: 0;
      font-size: 0.9rem;
    }

    .own .avatar-msg {
      background: #2b4c9e;
      color: white;
    }

    .bubble-wrapper {
      display: flex;
      flex-direction: column;
    }

    .message-bubble {
      background: white;
      padding: 12px 16px;
      border-radius: 20px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      border: 1px solid #e9f0f9;
      word-break: break-word;
    }

    .own .message-bubble {
      background: #e0edff;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 4px;
      border-color: #c2daf5;
    }

    .msg-time {
      font-size: 0.65rem;
      color: #64748b;
      margin-top: 4px;
      margin-left: 8px;
    }

    .own .msg-time {
      text-align: right;
      margin-right: 8px;
    }

    .system-msg {
      text-align: center;
      font-size: 0.75rem;
      color: #64748b;
      margin: 8px 0;
    }

    /* Respostas rápidas */
    .quick-replies {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 20px;
      border-top: 1px solid #e2edff;
      background: white;
    }

    .quick-reply {
      background: #f1f5f9;
      border: 1px solid #dbe7f5;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.1s;
      font-weight: 500;
    }

    .quick-reply:hover {
      background: #e0e7ff;
    }

    /* Área de envio */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: white;
      border-top: 1px solid #eef2f6;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 60px;
      padding: 12px 18px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      background: #ffffff;
    }

    .input-area input:focus {
      outline: none;
      border-color: #2b4c9e;
      box-shadow: 0 0 0 3px rgba(43,76,158,0.1);
    }

    .send-btn {
      background: #032363;
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: #1e3a8a;
      transform: scale(0.95);
    }

    /* Toast (igual ao anterior) */
    .toast-msg {
      visibility: hidden;
      min-width: 200px;
      background-color: #1f3a7c;
      color: #fff;
      text-align: center;
      border-radius: 40px;
      padding: 10px 20px;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast-msg.show {
      visibility: visible;
      opacity: 1;
    }

    /* Scrollbar */
    .messages-container::-webkit-scrollbar {
      width: 5px;
    }
    .messages-container::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
  </style>
</head>
<body>
<div class="chat-app">
  <div class="header">
    <div class="header-top">
      <a href="#" class="back-link" onclick="history.back(); return false;"><i class="fas fa-arrow-left"></i></a>
      <div class="group-info">
        <div class="group-name">
          <i class="fas fa-users"></i> Grupo de Estudos · Cálculo II
          <span class="online-badge"><i class="fas fa-circle" style="font-size: 8px;"></i> 5 online</span>
        </div>
        <div class="members">
          <i class="fas fa-user-graduate"></i> Ana, João, Rafael, Letícia + você
        </div>
      </div>
    </div>
  </div>

  <!-- Container de mensagens -->
  <div id="messagesContainer" class="messages-container">
    <!-- Mensagens iniciais serão inseridas via JS -->
  </div>

  <!-- Respostas rápidas -->
  <div class="quick-replies">
    <span class="quick-reply" data-reply="Bora marcar horário?">📅 Bora marcar horário?</span>
    <span class="quick-reply" data-reply="Alguém já fez a lista 3?">📝 Alguém já fez a lista 3?</span>
    <span class="quick-reply" data-reply="Vou compartilhar material">📎 Vou compartilhar material</span>
  </div>

  <!-- Campo de mensagem -->
  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Digite sua mensagem..." autocomplete="off">
    <button class="send-btn" id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>
<div id="toastMsg" class="toast-msg">✨ Mensagem enviada</div>

<script>
  (function(){
    'use strict';

    // ---------- Dados iniciais das mensagens ----------
    const initialMessages = [
      { sender: "Ana", initials: "A", text: "Pessoal, alguém afim de estudar derivadas parciais amanhã?", time: "10:15", isOwn: false },
      { sender: "João", initials: "J", text: "Eu topo! De tarde?", time: "10:17", isOwn: false },
      { sender: "Você", initials: "V", text: "Posso depois das 15h. Na biblioteca?", time: "10:20", isOwn: true },
      { sender: "Rafael", initials: "R", text: "Biblioteca ótimo! Levo o resumo de integrais.", time: "10:23", isOwn: false },
    ];

    // Elementos
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendMessageBtn');
    const toast = document.getElementById('toastMsg');

    // Função para mostrar toast
    function showToast(text, duration = 2000) {
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    // Função para escapar HTML (segurança)
    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Renderizar todas as mensagens
    function renderMessages(messages) {
      if (!messages.length) {
        messagesContainer.innerHTML = `<div class="system-msg">✨ Nenhuma mensagem ainda. Inicie a conversa!</div>`;
        return;
      }

      let html = '';
      messages.forEach((msg, index) => {
        const isOwn = msg.isOwn;
        const senderName = escapeHtml(msg.sender);
        const initials = escapeHtml(msg.initials);
        const text = escapeHtml(msg.text);
        const time = escapeHtml(msg.time);

        html += `
          <div class="message-row ${isOwn ? 'own' : ''}">
            <div class="avatar-msg">${initials}</div>
            <div class="bubble-wrapper">
              <div class="message-bubble">
                <strong style="font-size:0.8rem; display:block; margin-bottom:4px;">${senderName}</strong>
                ${text}
              </div>
              <div class="msg-time">${time}</div>
            </div>
          </div>
        `;
      });

      // Adiciona uma mensagem de sistema com a data
      const today = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'short' });
      html = `<div class="system-msg">📌 ${today}</div>` + html;

      messagesContainer.innerHTML = html;
      scrollToBottom();
    }

    // Rolagem automática
    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Adicionar nova mensagem (enviada pelo usuário)
    function addNewMessage(text) {
      if (!text.trim()) return;

      const now = new Date();
      const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      
      const newMsg = {
        sender: "Você",
        initials: "V",
        text: text.trim(),
        time: timeStr,
        isOwn: true
      };

      // Adiciona ao array local (se quisesse persistência, poderia salvar no localStorage)
      messageHistory.push(newMsg);
      renderMessages(messageHistory);
      messageInput.value = '';
      showToast('📨 Mensagem enviada para o grupo', 1500);
    }

    // Histórico de mensagens (será modificado)
    let messageHistory = [...initialMessages];

    // Inicializa renderização
    renderMessages(messageHistory);

    // Event listeners
    sendBtn.addEventListener('click', () => {
      addNewMessage(messageInput.value);
    });

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addNewMessage(messageInput.value);
      }
    });

    // Respostas rápidas
    document.querySelectorAll('.quick-reply').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const replyText = btn.getAttribute('data-reply') || btn.innerText;
        messageInput.value = replyText;
        messageInput.focus();
        // Opcional: já enviar automaticamente (mas vamos apenas preencher)
        showToast(`💬 Resposta rápida: "${replyText}"`, 1200);
      });
    });

    // Simular recebimento de mensagem após 8 segundos (opcional, para dar vida)
    setTimeout(() => {
      const autoReply = {
        sender: "Letícia",
        initials: "L",
        text: "Pessoal, também quero participar! Posso levar uns exercícios resolvidos.",
        time: new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }),
        isOwn: false
      };
      // Verifica se a mensagem não é duplicada (apenas simulação)
      const lastMsg = messageHistory[messageHistory.length-1];
      if (!lastMsg || lastMsg.text !== autoReply.text) {
        messageHistory.push(autoReply);
        renderMessages(messageHistory);
        showToast('💬 Letícia enviou uma mensagem', 1800);
      }
    }, 8000);

    // Pequeno easter egg: clique no nome do grupo mostra membros
    document.querySelector('.group-name').addEventListener('click', () => {
      showToast('👥 5 membros online · 12 no total', 1500);
    });

  })();
</script>
</body>
</html>
