
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>conecta+ | Grupo de Estudos - Chat entre Parceiros</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg , #032363 30%, #e6edf9 150%);
      font-family: 'Inter', sans-serif;
      padding: 20px 16px 40px 16px;
      min-height: 100vh;
    }

    .chat-app {
      max-width: 700px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      transition: all 0.2s;
    }

    /* Header do chat */
    .chat-header {
      background: linear-gradient(135deg, #1e2b6e, #2b4c9e);
      padding: 20px 24px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .group-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .group-avatar {
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .group-details h2 {
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .group-details p {
      font-size: 0.7rem;
      opacity: 0.9;
      margin-top: 4px;
    }

    .back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      color: white;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    /* Lista de membros (parceiros) */
    .members-section {
      background: #f8fafc;
      padding: 12px 20px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .members-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .member-list {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .member-chip {
      background: white;
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #cbd5e1;
      color: #1e293b;
    }

    .member-chip i {
      font-size: 0.7rem;
      color: #10b981;
    }

    /* Área de mensagens */
    .messages-area {
      height: 380px;
      overflow-y: auto;
      padding: 20px 20px 10px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #ffffff;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-own {
      align-self: flex-end;
    }

    .message-other {
      align-self: flex-start;
    }

    .message-bubble {
      padding: 10px 16px;
      border-radius: 1.5rem;
      background: #f1f5f9;
      color: #0f172a;
      word-wrap: break-word;
    }

    .message-own .message-bubble {
      background: #1e3a8a;
      color: white;
      border-bottom-right-radius: 0.3rem;
    }

    .message-other .message-bubble {
      background: #f1f5f9;
      border-bottom-left-radius: 0.3rem;
    }

    .message-sender {
      font-size: 0.7rem;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .message-own .message-sender {
      justify-content: flex-end;
      color: #a5c0f0;
    }

    .message-time {
      font-size: 0.6rem;
      margin-top: 4px;
      opacity: 0.7;
      text-align: right;
    }

    /* Input area */
    .input-area {
      padding: 16px 20px 24px;
      background: #ffffff;
      border-top: 1px solid #edf2f7;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 60px;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      background: #fefefe;
      transition: 0.2s;
    }

    .input-area input:focus {
      outline: none;
      border-color: #3b71ca;
      box-shadow: 0 0 0 3px rgba(59,113,202,0.2);
    }

    .send-btn {
      background: #1e3a8a;
      border: none;
      border-radius: 60px;
      padding: 12px 28px;
      font-weight: 700;
      font-size: 0.8rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .send-btn:hover {
      background: #2b4c9e;
      transform: scale(0.97);
    }

    .empty-chat {
      text-align: center;
      color: #94a3b8;
      padding: 48px 20px;
      font-size: 0.85rem;
    }

    /* Toast */
    .toast-msg {
      visibility: hidden;
      min-width: 200px;
      background-color: #1f3a7c;
      color: #fff;
      text-align: center;
      border-radius: 40px;
      padding: 10px 20px;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .toast-msg.show {
      visibility: visible;
      opacity: 1;
    }

    @media (max-width: 550px) {
      .messages-area {
        height: 320px;
      }
      .member-chip {
        font-size: 0.65rem;
      }
      .send-btn span {
        display: none;
      }
      .send-btn i {
        margin: 0;
      }
      .send-btn {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
<div class="chat-app">
  <div class="chat-header">
    <div class="group-info">
      <div class="group-avatar">
        <i class="fas fa-users"></i>
      </div>
      <div class="group-details">
        <h2><i class="fas fa-handshake"></i> Parceiros de Estudos</h2>
        <p>Grupo oficial • Conexões que viram aprendizado</p>
      </div>
    </div>
    <button class="back-btn" id="backButton"><a href="parceirosestudosteste.html" >Voltar</button></a>
    <button class="btn"><a href="Juntaitest.html" >Voltar</button></a>
    

  </div>

  <div class="members-section">
    <div class="members-title"><i class="fas fa-user-friends"></i> Membros ativos · 6 parceiros</div>
    <div class="member-list">
      <span class="member-chip"><i class="fas fa-circle" style="color:#10b981; font-size: 0.45rem;"></i> Ana Clara</span>
      <span class="member-chip"><i class="fas fa-circle" style="color:#10b981; font-size: 0.45rem;"></i> João Pedro</span>
      <span class="member-chip"><i class="fas fa-circle" style="color:#10b981; font-size: 0.45rem;"></i> Letícia</span>
      <span class="member-chip"><i class="fas fa-circle" style="color:#10b981; font-size: 0.45rem;"></i> Rafael</span>
      <span class="member-chip"><i class="fas fa-circle" style="color:#10b981; font-size: 0.45rem;"></i> Camila</span>
      <span class="member-chip"><i class="fas fa-circle" style="color:#10b981; font-size: 0.45rem;"></i> Thiago</span>
    </div>
  </div>

  <div id="messagesContainer" class="messages-area">
    <div class="empty-chat">
      <i class="fas fa-comment-dots" style="font-size: 2rem; opacity: 0.5; margin-bottom: 12px; display: block;"></i>
      Nenhuma mensagem ainda. Envie uma saudação para os parceiros!
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Digite sua mensagem para o grupo..." autocomplete="off">
    <button id="sendMessageBtn" class="send-btn"><i class="fas fa-paper-plane"></i> <span>Enviar</span></button>
  </div>
</div>
<div id="toastMsg" class="toast-msg">✨ Mensagem enviada para o grupo!</div>

<script>
  // Simulação de banco de dados de mensagens do grupo
  // Estrutura: { sender: string, text: string, timestamp: string, isOwn: boolean }
 

  // Lista de outros participantes (para simular mensagens automáticas opcionais, mas vamos manter manual)
  const otherMembers = ["Ana Clara", "João Pedro", "Letícia", "Rafael", "Camila", "Thiago"];

  // Carregar mensagens salvas no localStorage
  function loadMessages() {
    const stored = localStorage.getItem("conecta_group_chat_messages");
    if (stored) {
      try {
        groupMessages = JSON.parse(stored);
      } catch(e) {
        groupMessages = [];
      }
    } else {
      // Mensagens de boas-vinda para simular interação
      groupMessages = [
        { sender: "Ana Clara", text: "Olá pessoal! Alguém animado para estudar cálculo hoje?", timestamp: "14:32", isOwn: false },
        { sender: "João Pedro", text: "Eu topo! Vamos revisar derivadas?", timestamp: "14:35", isOwn: false },
        { sender: "Letícia", text: "Posso participar também? Preciso de ajuda em algoritmos.", timestamp: "14:38", isOwn: false },
        { sender: "Sistema", text: "Bem-vindo ao grupo! Aqui vocês podem trocar ideias, materiais e organizar estudos coletivos.", timestamp: "14:40", isOwn: false }
      ];
      saveMessages();
    }
    renderMessages();
  }

  function saveMessages() {
    localStorage.setItem("conecta_group_chat_messages", JSON.stringify(groupMessages));
  }

  // Formatar hora atual
  function getCurrentTime() {
    const now = new Date();
    return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // Enviar mensagem (simula envio para o grupo)
  function sendMessageToGroup(text) {
    if (!text.trim()) return;
    const newMessage = {
      sender: currentUserName,
      text: text.trim(),
      timestamp: getCurrentTime(),
      isOwn: true
    };
    groupMessages.push(newMessage);
    saveMessages();
    renderMessages();
    // Simular resposta aleatória de algum membro após 2 segundos (para dar dinamismo)
    simulateRandomReply(text);
    showToast("📤 Mensagem enviada para o grupo!");
    document.getElementById('messageInput').value = '';
  }

  // Função para simular resposta de um parceiro (opcional, mas torna a simulação mais real)
  function simulateRandomReply(originalMessage) {
    // 40% de chance de alguém responder (para não floodar)
    const shouldReply = Math.random() < 0.4;
    if (!shouldReply) return;
    
    // Escolher um membro aleatório (diferente do usuário atual)
    const availableMembers = otherMembers.filter(m => m !== currentUserName);
    if (availableMembers.length === 0) return;
    const randomMember = availableMembers[Math.floor(Math.random() * availableMembers.length)];
    
    // Respostas contextuais simples
    const replies = [
      "Boa ideia! Vamos combinar um horário?",
      "Isso mesmo, eu também estou estudando isso!",
      "Alguém pode compartilhar material sobre isso?",
      "Legal! Podemos marcar uma call depois?",
      "Obrigado pela mensagem, pessoal!",
      "Quem mais está com dificuldade nessa matéria?",
      "Eu topo estudar junto!",
      "👏👏 Excelente iniciativa!"
    ];
    const replyText = replies[Math.floor(Math.random() * replies.length)];
    
    setTimeout(() => {
      const botMessage = {
        sender: randomMember,
        text: replyText,
        timestamp: getCurrentTime(),
        isOwn: false
      };
      groupMessages.push(botMessage);
      saveMessages();
      renderMessages();
      showToast(`💬 ${randomMember} respondeu no grupo!`, 2500);
    }, 1800);
  }

  // Renderizar todas as mensagens no container
  function renderMessages() {
    const container = document.getElementById('messagesContainer');
    if (!container) return;
    
    if (groupMessages.length === 0) {
      container.innerHTML = `<div class="empty-chat"><i class="fas fa-comment-dots" style="font-size: 2rem; opacity: 0.5; margin-bottom: 12px; display: block;"></i>Nenhuma mensagem ainda. Seja o primeiro a conversar!</div>`;
      return;
    }
    
    container.innerHTML = '';
    groupMessages.forEach(msg => {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${msg.isOwn ? 'message-own' : 'message-other'}`;
      
      const senderHtml = !msg.isOwn ? `<div class="message-sender"><i class="fas fa-user-circle"></i> ${escapeHtml(msg.sender)}</div>` : `<div class="message-sender">Você <i class="fas fa-check-double" style="font-size:0.65rem;"></i></div>`;
      
      messageDiv.innerHTML = `
        ${senderHtml}
        <div class="message-bubble">
          ${escapeHtml(msg.text)}
        </div>
        <div class="message-time">${msg.timestamp}</div>
      `;
      container.appendChild(messageDiv);
    });
    // Scroll automático para o final
    container.scrollTop = container.scrollHeight;
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  function showToast(message, duration = 2000) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
    }, duration);
  }
  
  // Eventos
  function init() {
    loadMessages();
    
    const sendBtn = document.getElementById('sendMessageBtn');
    const inputField = document.getElementById('messageInput');
    
    sendBtn.addEventListener('click', () => {
      const text = inputField.value;
      if (text.trim()) {
        sendMessageToGroup(text);
      } else {
        showToast("Digite uma mensagem antes de enviar.", 1500);
      }
    });
    
    inputField.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const text = inputField.value;
        if (text.trim()) {
          sendMessageToGroup(text);
        } else {
          showToast("Digite uma mensagem antes de enviar.", 1500);
        }
      }
    });
    
    // Botão voltar (simula navegação)
    const backBtn = document.getElementById('backButton');
    backBtn.addEventListener('click', () => {
      // Tenta voltar para página anterior, se não, mostra mensagem
      if (document.referrer && document.referrer !== "") {
        window.history.back();
      } else {
        showToast("Use o menu principal para navegar.", 2000);
        // Opcional: redirecionar para uma página padrão ou apenas alerta
        setTimeout(() => {
          window.location.href = "about:blank"; // apenas para não travar, mas idealmente o usuário tem histórico
        }, 100);
      }
    });
    
    // Pequena simulação de boas-vindas caso seja o primeiro acesso
    if (groupMessages.length <= 1) {
      setTimeout(() => {
        const welcomeMsg = {
          sender: "Sistema",
          text: `✨ ${currentUserName} entrou no grupo. Dê um olá para os parceiros!`,
          timestamp: getCurrentTime(),
          isOwn: false
        };
        groupMessages.push(welcomeMsg);
        saveMessages();
        renderMessages();
      }, 500);
    }
  }
  
  init();
</script>
</body>
</html>
