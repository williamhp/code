<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Junta Aí · Eventos Próximos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #032363 30%, #e6edf9 150%);
      color: #1e293b;
      min-height: 100vh;
      padding: 20px 16px 80px;
    }
    .app-container { max-width: 500px; margin: 0 auto; }
    .header-bar {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    }
    .back-btn {
      background: rgba(255,255,255,0.9); width: 44px; height: 44px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: #032363; font-size: 1.3rem; text-decoration: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    h1 {
      font-size: 1.8rem; font-weight: 700;
      background: linear-gradient(135deg, #032363, #8b5cf6);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .card {
      background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px;
      border: 2px solid #032363; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }
    .event-item {
      display: flex; gap: 16px; padding: 18px 0; border-bottom: 1px solid #eef2f6;
    }
    .event-date {
      width: 60px; height: 60px; background: #ede9fe; border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-weight: 700; color: #6d28d9;
    }
    .event-info { flex: 1; }
    .event-title { font-weight: 700; margin-bottom: 4px; }
    .event-meta { font-size: 0.75rem; color: #64748b; }
    .btn-small {
      background: #032363; color: white; border: none;
      padding: 8px 16px; border-radius: 30px; font-weight: 600; cursor: pointer;
    }
    .toast-msg {
      visibility: hidden; min-width: 200px; background: #1f3a7c;
      color: white; text-align: center; border-radius: 40px;
      padding: 12px 20px; position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%); font-size: 0.9rem; opacity: 0;
      transition: 0.2s; z-index: 1000;
    }
    .toast-msg.show { visibility: visible; opacity: 1; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header-bar">
    <a href="Juntaitest.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h1><i class="far fa-calendar-alt"></i> Eventos</h1>
  </div>

  <div class="card">
    <div id="eventList"></div>
  </div>
</div>

<div id="toastMsg" class="toast-msg">🎉 Presença confirmada!</div>

<script>
  const eventos = [
    { titulo: 'Workshop de Fotografia', data: '20/04', horario: '14h', local: 'Online', participantes: 8 },
    { titulo: 'Noite de Pizza e Conversas', data: '18/04', horario: '20h', local: 'Pizzaria Central', participantes: 15 },
    { titulo: 'Oficina de Aquarela', data: '22/04', horario: '19h', local: 'Ateliê Criativo', participantes: 5 },
    { titulo: 'Happy Hour Conecta+', data: '17/04', horario: '18h30', local: 'Bar do Campus', participantes: 22 },
    { titulo: 'Troca de Livros', data: '19/04', horario: '10h', local: 'Biblioteca', participantes: 12 },
  ];

  const container = document.getElementById('eventList');
  const toast = document.getElementById('toastMsg');

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }

  let html = '';
  eventos.forEach(e => {
    const [dia, mes] = e.data.split('/');
    html += `
      <div class="event-item">
        <div class="event-date"><span style="font-size:1.2rem;">${dia}</span><span>/${mes}</span></div>
        <div class="event-info">
          <div class="event-title">${e.titulo}</div>
          <div class="event-meta"><i class="far fa-clock"></i> ${e.horario} · ${e.local}</div>
          <div class="event-meta"><i class="fas fa-user"></i> ${e.participantes} participantes</div>
        </div>
        <button class="btn-small confirm-btn" data-evento="${e.titulo}">Participar</button>
      </div>
    `;
  });
  container.innerHTML = html;

  document.querySelectorAll('.confirm-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      showToast(`🎟️ Você confirmou presença em "${btn.dataset.evento}"`);
      btn.disabled = true;
      btn.textContent = 'Confirmado ✓';
      btn.style.background = '#64748b';
    });
  });
</script>
</body>
</html>
