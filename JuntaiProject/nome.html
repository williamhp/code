<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nome - CampusConnect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #03247c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    .logo { font-size: 2rem; margin-bottom: 8px; }
    h1 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 4px; }
    p { color: #d5ecf1; font-size: 0.9rem; margin-bottom: 28px; }
    .step { font-size: 0.8rem; color: black; margin-bottom: 16px; }
    label { display: block; text-align: left; font-size: 0.85rem; color: rgb(207, 236, 245)9f9; margin-bottom: 6px;
     border-radius:10px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      margin-top: 20px;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #16a34a; }
    .back { display: block; margin-top: 12px; font-size: 0.85rem; color: #888; text-decoration: none; }
    .back:hover { color: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">👤</div>
    <h1>Seu nome</h1>
    <p class="step">Passo 3 de 3</p>
    <p>Como seus colegas vão te conhecer</p>

    <label for="nome">Nome completo</label>
    <input type="text" id="nome" placeholder="Ex: Maria Silva" />

    <a href="#" class="btn" onclick="alert('Cadastro concluído! Bem-vindo ao CampusConnect 🎉')">Concluir cadastro</a>
    <a href="email.html" class="back">← Voltar</a>
    <a href="juntai.html" class="btn">Ir para o App</a>
  </div>
</body>
</html>
