<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email - CampusConnect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    .logo { font-size: 2rem; margin-bottom: 8px; }
    h1 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 4px; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
    .step { font-size: 0.8rem; color: #4f46e5; margin-bottom: 16px; }
    label { display: block; text-align: left; font-size: 0.85rem; color: #444; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      margin-top: 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #3730a3; }
    .back { display: block; margin-top: 12px; font-size: 0.85rem; color: #888; text-decoration: none; }
    .back:hover { color: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📧</div>
    <h1>Seu e-mail</h1>
    <p class="step">Passo 2 de 3</p>
    <p>Use seu e-mail institucional ou pessoal</p>

    <label for="email">E-mail</label>
    <input type="email" id="email" placeholder="aluno@faculdade.edu.br" />

    <a href="nome.html" class="btn">Continuar</a>
    <a href="login.html" class="back">← Voltar</a>
  </div>
</body>
</html>
